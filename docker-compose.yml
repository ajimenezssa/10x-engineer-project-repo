version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: promptlab-backend
    ports:
      - "8000:8000"
    environment:
      - ENV=development
    volumes:
      - ./backend/app:/app/app  # Hot reload: sync code changes
    command: >
      uvicorn app.api:app
      --host 0.0.0.0
      --port 8000
      --reload