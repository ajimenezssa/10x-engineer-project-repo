version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ENV=development
      - DEBUG=1
    volumes:
      - ./backend:/app  # hot reload: sync local changes
      - /app/__pycache__  # optional: avoid caching issues
    command: >
      uvicorn main:app --host 0.0.0.0 --port 8000 --reload