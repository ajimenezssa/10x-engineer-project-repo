name: Docker Compose Dev Build

on:
  push:
    branches:
      - main
      - 'feature/**'
  pull_request:
    branches:
      - main

jobs:
  dev-build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 3: Install Docker Compose
      - name: Install Docker Compose
        run: |
          sudo curl -L "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
          sudo chmod +x /usr/local/bin/docker-compose
          docker-compose version

      # Step 4: Build the backend image
      - name: Build backend container
        run: docker-compose -f docker-compose.yml build backend

      # Step 5: Start backend in development mode
      - name: Start backend (dev)
        run: |
          docker-compose -f docker-compose.yml run -d \
            --name promptlab-backend-dev \
            backend \
            uvicorn app.api:app --host 0.0.0.0 --port 8000 --reload

      # Step 6: Wait and verify container
      - name: Wait for backend
        run: |
          echo "Waiting 10s for backend to start..."
          sleep 10
          docker ps

      # Step 7: Stop the container (optional)
      - name: Tear down
        if: always()
        run: docker stop promptlab-backend-dev && docker rm promptlab-backend-dev